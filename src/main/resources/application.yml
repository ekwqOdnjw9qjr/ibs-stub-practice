server:
  port: 8080

spring:
  application:
    name: processing-stub
  datasource:
    url: jdbc:h2:mem:processingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: user
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
        trace: false

stub:
  delay:
    default-delay: 1
    profiles:
      test1: 2
      test2: 4
  bank:
    bik-length: 10
    default-company: "HL pay company"

logging:
  level:
    com.ibs: DEBUG
  file:
    name: logs/app.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics

